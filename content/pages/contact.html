<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/assets/styles/general.css" />
    <link rel="stylesheet" href="/assets/styles/contact.css" />
    <title>Contact Me!</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <button
        class="navbar-toggler ml-auto"
        type="button"
        data-toggle="collapse"
        data-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item">
            <a class="nav-link" href="/index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/content/pages/about.html">About</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="/content/pages/contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="contactMe-text">
      <h2>Feel free to contact me via the options below!</h2>
    </div>

    <!-- LinkedIn Contact Card -->
    <div
      class="contact-card-container text-center mx-auto mt-4"
      style="max-width: 350px"
    >
      <script
        type="text/javascript"
        src="https://platform.linkedin.com/badges/js/profile.js"
        async
        defer
      ></script>
      <div
        class="LI-profile-badge"
        data-version="v1"
        data-size="medium"
        data-locale="en_US"
        data-type="horizontal"
        data-theme="light"
        data-vanity="ngkeelun"
      ></div>
    </div>

    <!-- Social / Contact Icons -->
    <div class="contact-icons d-flex justify-content-center mt-3 flex-wrap">
      <a
        href="https://www.linkedin.com/in/ngkeelun/"
        target="_blank"
        class="mx-2"
      >
        <img
          src="/assets/images/linkedinicon.png"
          alt="LinkedIn"
          class="contact-icon"
        />
      </a>
      <a href="mailto:keelunng@gmail.com" class="mx-2">
        <img
          src="/assets/images/emailicon.png"
          alt="Email"
          class="contact-icon"
        />
      </a>
      <a href="https://wa.me/6590683985" target="_blank" class="mx-2">
        <img
          src="/assets/images/whatsappicon.png"
          alt="Whatsapp"
          class="contact-icon"
        />
      </a>
    </div>

    <!-- Guestbook -->
    <section class="py-5">
      <div class="container" style="max-width: 720px">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div>
            <h2 class="mb-0 fw-semibold" id="leaveMessagetxt">
              Leave a message!
            </h2>
            <p class="text-muted mb-0" style="font-size: 0.875rem">
              <span class="gb-realtime-dot me-1"></span>
              Live &mdash; messages appear in real time
            </p>
          </div>
          <div class="d-flex align-items-center" style="gap: 0.5rem">
            <span class="badge bg-secondary" id="gb-count">Loading…</span>
            <button
              class="gb-admin-btn"
              id="gb-admin-btn"
              onclick="toggleAdmin()"
            >
              Admin
            </button>
          </div>
        </div>

        <!-- Form -->
        <div
          class="card border-0 shadow-sm mb-4"
          style="border-radius: var(--gb-radius)"
        >
          <div class="card-body p-4">
            <div class="row g-2 mb-2">
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  id="gb-name"
                  placeholder="Name"
                  maxlength="50"
                />
              </div>
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  id="gb-location"
                  placeholder="Where you're from (optional)"
                  maxlength="60"
                />
              </div>
            </div>
            <textarea
              class="form-control mb-2"
              id="gb-message"
              rows="3"
              placeholder="Leave a message…"
              maxlength="300"
            ></textarea>
            <div class="d-flex align-items-center justify-content-between">
              <span class="text-muted" id="gb-char-count">0 / 300</span>
              <button class="btn btn-primary btn-sm px-4" id="gb-submit">
                Post message
              </button>
            </div>
          </div>
        </div>

        <!-- Entries list -->
        <div id="gb-entries">
          <div class="text-center text-muted py-4" id="gb-loading">
            Loading messages…
          </div>
        </div>

        <div
          class="text-center mt-2 mb-3"
          id="gb-show-more-wrap"
          style="display: none"
        >
          <button
            class="btn btn-outline-secondary btn-sm px-4"
            style="border-radius: 999px; font-size: 0.8rem"
            onclick="showAllEntries()"
            id="gb-show-more-btn"
          >
            Show all messages ↓
          </button>
        </div>
      </div>
    </section>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
      <div id="gb-toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="gb-toast-body">Message posted!</div>
          <button
            type="button"
            class="btn-close me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <div class="gb-login-overlay" id="gb-login-overlay">
      <div class="gb-login-modal">
        <button class="gb-login-close" onclick="closeLoginModal()">
          &times;
        </button>
        <div class="gb-login-title">Admin Login</div>
        <div class="gb-login-sub">Sign in as admin</div>
        <input
          class="gb-login-input"
          type="email"
          id="gb-email"
          placeholder="Email"
        />
        <input
          class="gb-login-input"
          type="password"
          id="gb-password"
          placeholder="Password"
        />
        <button
          class="gb-login-submit"
          id="gb-login-submit"
          onclick="doLogin()"
        >
          Sign in
        </button>
        <div class="gb-login-error" id="gb-login-error">
          Incorrect email or password.
        </div>
      </div>
    </div>

    <script src="/assets/styles/navbar.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/functionalities/guestBook.js"></script>
  </body>
</html>
