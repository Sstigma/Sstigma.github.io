<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/assets/styles/general.css" />
    <link rel="stylesheet" href="/assets/styles/contact.css" />
    <title>Contact Me!</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <button
        class="navbar-toggler ml-auto"
        type="button"
        data-toggle="collapse"
        data-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item active">
            <a class="nav-link" href="/index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/content/pages/about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/content/pages/contact.html">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/content/pages/portfolio.html"
              >Portfolio</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div class="contactMe-text">
      <h2>Feel free to contact me via the options below!</h2>
    </div>

    <!-- LinkedIn Contact Card -->
    <div
      class="contact-card-container text-center mx-auto mt-4"
      style="max-width: 350px"
    >
      <script
        type="text/javascript"
        src="https://platform.linkedin.com/badges/js/profile.js"
        async
        defer
      ></script>
      <div
        class="LI-profile-badge"
        data-version="v1"
        data-size="medium"
        data-locale="en_US"
        data-type="horizontal"
        data-theme="light"
        data-vanity="ngkeelun"
      ></div>
    </div>

    <!-- Social / Contact Icons -->
    <div class="contact-icons d-flex justify-content-center mt-3 flex-wrap">
      <a
        href="https://www.linkedin.com/in/ngkeelun/"
        target="_blank"
        class="mx-2"
      >
        <img
          src="/assets/images/linkedinicon.png"
          alt="LinkedIn"
          class="contact-icon"
        />
      </a>
      <a href="mailto:keelunng@gmail.com" class="mx-2">
        <img
          src="/assets/images/emailicon.png"
          alt="Email"
          class="contact-icon"
        />
      </a>
      <a href="https://wa.me/6590683985" target="_blank" class="mx-2">
        <img
          src="/assets/images/whatsappicon.png"
          alt="Whatsapp"
          class="contact-icon"
        />
      </a>
    </div>

    <!-- Scripts -->
    <script src="/assets/styles/navbar.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  </body>
</html>
